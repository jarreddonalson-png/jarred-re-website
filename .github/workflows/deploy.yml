name: Deploy Theme to SiteGround

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SITEGROUND_SSH_PRIVATE_KEY }}

      - name: Add SiteGround to known hosts
        run: |
          ssh-keyscan -p 18765 -H ${{ secrets.SITEGROUND_HOST }} >> ~/.ssh/known_hosts

      - name: Zip the theme
        run: |
          cd wp-content/themes/
          zip -r jarred-re.zip jarred-re/
          mv jarred-re.zip $GITHUB_WORKSPACE/

      - name: Upload theme to server
        run: |
          scp -P 18765 jarred-re.zip \
            ${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}:/tmp/

      - name: Extract theme & flush cache
        run: |
          ssh -p 18765 ${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }} "
            THEME_DIR=/home/${{ secrets.SITEGROUND_USER }}/www/${{ secrets.SITEGROUND_SITE }}/public_html/wp-content/themes/jarred-re
            rm -rf \$THEME_DIR
            unzip -o /tmp/jarred-re.zip -d \$(dirname \$THEME_DIR)
            rm /tmp/jarred-re.zip
            wp --path=/home/${{ secrets.SITEGROUND_USER }}/www/${{ secrets.SITEGROUND_SITE }}/public_html sg purge --all 2>/dev/null || true
          "

      - name: Done
        run: echo "✅ Theme deployed successfully."
